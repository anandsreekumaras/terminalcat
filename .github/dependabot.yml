# Dependabot keeps the deps current — files PRs when a new version of any
# dependency ships. Particularly important for things that touch the auth
# / WS / PTY path: jose, ws, node-pty, xterm.js. CI (.github/workflows/ci.yml)
# type-checks every PR so a breaking-change bump fails loudly.
#
# Schedule is weekly to avoid getting flooded; bump to daily if you'd like
# faster CVE response.

version: 2
updates:
  # Node deps in the project root (package.json + pnpm-lock.yaml)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 10
    labels:
      - dependencies
    commit-message:
      prefix: deps
      include: scope
    # Deliberate holds — libs we're consciously NOT chasing the major
    # release of. Dependabot won't refile these every week. Remove the
    # entry when you're ready to do the upgrade work.
    #   - jose 5 -> 6:         jose 6 dropped the explicit Node CJS
    #                          build; we rely on it via tsconfig
    #                          module=commonjs.
    #   - zod  3 -> 4:         zod 4 has API breakage across
    #                          z.discriminatedUnion, z.refine, error
    #                          formatting. Schema rewrite needed.
    #   - typescript 5 -> 6:   TS 6 ships stricter lib defaults + new
    #                          checks; CI typecheck failed on the
    #                          dependabot PR. Defer the upgrade.
    #   - @types/node >=21:    runtime is pinned to Node 20 LTS via
    #                          engines.node. Type-package major should
    #                          track the Node major actually deployed.
    ignore:
      - dependency-name: "jose"
        versions: [">=6.0.0"]
      - dependency-name: "zod"
        versions: [">=4.0.0"]
      - dependency-name: "typescript"
        versions: [">=6.0.0"]
      - dependency-name: "@types/node"
        versions: [">=21.0.0"]
    groups:
      # Cluster minor+patch bumps together so they update in a single PR
      # instead of seven simultaneous tiny ones. MAJOR bumps are
      # explicitly excluded from the group — they come as their own PR
      # so each can be reviewed against its changelog one at a time
      # (e.g., jose 5→6 dropped the Node CJS build; zod 3→4 is an API
      # rewrite — both should NOT be grouped with patch bumps).
      runtime:
        patterns:
          - "node-pty"
          - "ws"
          - "jose"
          - "zod"
          - "pino"
          - "pino-roll"
        update-types:
          - "minor"
          - "patch"
      types:
        patterns:
          - "@types/*"
        update-types:
          - "minor"
          - "patch"
      tooling:
        patterns:
          - "tsx"
          - "typescript"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions versions in any workflow YAMLs we add later
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: ci
