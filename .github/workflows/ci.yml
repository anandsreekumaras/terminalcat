# Minimal CI: just makes sure the TypeScript still type-checks cleanly on
# every push and pull request to main. Catches the "broke types in a hurry"
# class of regression before it lands.
#
# Future expansions (not now): a real test suite (vitest), a lint job
# (eslint), node-pty smoke test on multiple Node versions. Spec defers
# the full test suite to post-v2.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any in-flight CI run for the same ref when a new push comes in —
# saves CI minutes and shows fresh status faster.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: typecheck (Node 20)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Enable pnpm via corepack
        # `corepack enable` honours the `packageManager` field in
        # package.json so CI uses the exact pnpm pinned for prod.
        # No `corepack prepare` needed.
        run: corepack enable

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm exec tsc --noEmit
