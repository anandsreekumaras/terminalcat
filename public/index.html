          if (it.disabled) b.disabled = true;
          // Use innerHTML so we can show a right-aligned shortcut hint.
          b.innerHTML = escapeHtml(it.label) +
            (it.shortcut ? `<span class="ctx-shortcut">${escapeHtml(it.shortcut)}</span>` : '');
          if (!it.disabled) {
            b.addEventListener('click', () => {
              closeContextMenu();
              try { it.action?.(); } catch (err) { console.error(err); }
            });
          }
          ctxMenuEl.appendChild(b);
        }
      }
      ctxMenuEl.style.left = x + 'px';
      ctxMenuEl.style.top = y + 'px';
      ctxMenuEl.classList.add('show');
      ctxMenuEl.setAttribute('aria-hidden', 'false');
      // Reposition if the menu would clip off-screen.
      requestAnimationFrame(() => {
        const r = ctxMenuEl.getBoundingClientRect();
        if (r.right > window.innerWidth - 4) {
          ctxMenuEl.style.left = Math.max(4, window.innerWidth - r.width - 4) + 'px';
        }
        if (r.bottom > window.innerHeight - 4) {
          ctxMenuEl.style.top = Math.max(4, window.innerHeight - r.height - 4) + 'px';
        }
      });
    }
    function closeContextMenu() {
      ctxMenuEl.classList.remove('show');
      ctxMenuEl.setAttribute('aria-hidden', 'true');
    }
    // Close on outside click and Escape.
    window.addEventListener('mousedown', (e) => {
      if (!e.target.closest('#ctx-menu')) closeContextMenu();
    });
    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeContextMenu();
    });
    window.addEventListener('blur', closeContextMenu);

    // SINGLE source of truth for right-click. Capture phase + always
    // preventDefault + stopImmediatePropagation. This:
    //   - blocks Chrome's native textarea context menu on xterm.js's
    //     hidden `.xterm-helper-textarea` (the "Cut/Paste/Spellcheck/
    //     Zoom/Inspect" one that was stacking on top of our menu)
    //   - blocks the page-level browser menu everywhere else
    //   - prevents any leftover element-level contextmenu listeners
    //     from also firing (stopImmediatePropagation)
    // Then routes to our own context menu based on what was clicked.
    // window.prompt() boxes are out-of-document browser dialogs, so this
    // doesn't affect typing/right-click paste inside them.
    document.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      e.stopImmediatePropagation();

      const tab = e.target.closest('.tab');
      if (tab && tab.dataset.id) {
        openTabContext(tab.dataset.id, e.clientX, e.clientY);
        return;
      }
      if (e.target.closest('#panes') && activeId) {
        openTerminalContext(e.clientX, e.clientY);
        return;
      }
      // Any other area: just suppress the native menu, no custom one shown.
    }, true);

    // Items shared between desktop ctx-menu and mobile action-sheet.
    function terminalActions() {
      const id = activeId;
      const cs = currentSession();
      const hasSel = !!cs?.term.getSelection();
      return [
        { label: 'Copy',          shortcut: 'Ctrl+Shift+C', disabled: !hasSel, action: async () => {
            const sel = cs?.term.getSelection();
            if (sel) await navigator.clipboard.writeText(sel).catch(() => {});
        }},
        { label: 'Paste',         shortcut: 'Ctrl+Shift+V', action: async () => {
            try {
              const txt = await navigator.clipboard.readText();
              if (txt && id) await pasteText(id, txt);
            } catch (err) {
              currentSession()?.writeStatus(`\r\n\x1b[31m[paste failed: ${err.message}]\x1b[0m\r\n`);
            }
        }},
        { label: 'Select all',    shortcut: 'Ctrl+Shift+A', action: () => cs?.term.selectAll() },
        { kind: 'sep' },
        { label: 'Search...',     shortcut: 'Ctrl+Shift+F', action: openSearch },
        { label: 'Clear screen', action: () => {
          // Belt-and-suspenders: clear xterm's in-browser buffer AND tell
          // the shell to redraw via Ctrl-L. With only the latter, bash
          // does a clear+redraw but xterm's scrollback in the browser
          // still has the old content above. With only the former,
          // bash's idea of the cursor row is wrong on some prompts.
          const cs = currentSession();
          cs?.term.clear();
          if (id) sendStdin(id, '\x0c');
        }},
        { kind: 'sep' },
        { label: 'Detach session', danger: true, action: () => { if (id) sendCtrl({ type: 'session-close', id }); } },
      ];
    }

    function openTerminalContext(x, y) {
      if (!activeId) return;
      openContextMenu(terminalActions(), x, y);
    }

    function tabActions(id) {
      return [
        { label: `Session: ${id}`, disabled: true },
        { kind: 'sep' },
        { label: 'Rename...',  action: () => {
          const raw = window.prompt(`Rename "${id}" to:`, id);
          if (raw === null) return;
          const newId = raw.trim();
          if (!SESSION_ID_RE.test(newId)) { alert('Invalid id'); return; }
          if (newId === id) return;
          if (tabs.has(newId)) { alert(`Tab "${newId}" exists`); return; }
          sendCtrl({ type: 'session-rename', id, newId });
        }},
        { label: 'Detach',     action: () => sendCtrl({ type: 'session-close', id }) },
        { label: 'Kill...',    danger: true, action: () => {
          if (!confirm(`Kill session "${id}"? This will end any running processes inside.`)) return;
          sendCtrl({ type: 'session-kill', id });
        }},
      ];
    }
    function openTabContext(id, x, y) {
      openContextMenu(tabActions(id), x, y);
    }

    // Replace the old mobile bottom-sheet implementations of these so
    // both the right-click menu and the long-press sheet use the same
    // action set. (Long-press handlers reference openTerminalMenu /
    // openTabMenu — keep those names as wrappers around the actions.)
    function openTerminalMenu() {
      buildSheet([
        ...terminalActions().map((it) => it.kind === 'sep'
          ? it
          : { kind: 'btn', label: it.label, danger: it.danger, action: it.action }),
        { kind: 'btn', label: 'Cancel', action: () => {} },
      ]);
    }
    function openTabMenu(id) {
      buildSheet([
        ...tabActions(id).map((it) => it.kind === 'sep'
          ? it
          : { kind: it.disabled ? 'header' : 'btn', text: it.label, label: it.label, danger: it.danger, action: it.action }),
        { kind: 'btn', label: 'Cancel', action: () => {} },
      ]);
    }

    // ===== tmux mouse toggle (helper bar 🖱) ============================
    // Default: ON  (scroll wheel scrolls tmux's scrollback, mouse selection
    //               requires Shift+click+drag — xterm.js convention).
    // OFF:           xterm.js owns the mouse — selection works without
    //               Shift, but scroll wheel sends ↑/↓ to the inner shell.
    const TMUX_MOUSE_KEY = 'tc.tmuxMouse';
    let tmuxMouseOn = (localStorage.getItem(TMUX_MOUSE_KEY) ?? 'on') !== 'off';
    function paintMouseBtn() {
      const btn = document.getElementById('btn-mouse');
      if (!btn) return;
      btn.classList.toggle('sticky-on', tmuxMouseOn);
      btn.title = tmuxMouseOn
        ? 'Tmux mouse: ON  (scroll = scrollback, Shift+click to select). Tap to switch.'
        : 'Tmux mouse: OFF (native selection, scroll = ↑/↓ history). Tap to switch.';
    }
    paintMouseBtn();
    document.getElementById('btn-mouse').addEventListener('click', () => {
      tmuxMouseOn = !tmuxMouseOn;
      localStorage.setItem(TMUX_MOUSE_KEY, tmuxMouseOn ? 'on' : 'off');
      sendCtrl({ type: 'tmux-mouse', on: tmuxMouseOn });
      paintMouseBtn();
    });
    // On reconnect / first connect, push the persisted preference to the
    // server so it doesn't reset to the default every page load.
    const _origConnect = connect;

    // ===== detached bar (chips) =========================================
    // Each chip is two regions: clickable-text (reattach) and an × (kill,
    // with confirm). Hidden tabs (CSS .tab.dormant{display:none}) are
    // surfaced here so they don't disappear from the UI.
    const detachedBar = document.getElementById('detached-bar');
    function paintDetachedBar() {
      detachedBar.innerHTML = '';
      const dormantIds = [];
      for (const t of tabs.values()) {
        if (!t.session) dormantIds.push(t.id);
      }
      if (dormantIds.length === 0) return;

      const label = document.createElement('span');
      label.className = 'det-label';
      label.textContent = 'Detached:';
      detachedBar.appendChild(label);

      for (const id of dormantIds) {
        const chip = document.createElement('div');
        chip.className = 'det-chip';

        const attach = document.createElement('span');
        attach.className = 'det-attach';
        attach.textContent = id;
        attach.title = `Reattach session "${id}"`;
        attach.addEventListener('click', () => switchTo(id));

        const kill = document.createElement('button');
        kill.className = 'det-kill';
        kill.type = 'button';
        kill.textContent = '×';
        kill.title = `Kill session "${id}"`;
        kill.setAttribute('aria-label', `Kill ${id}`);
        kill.addEventListener('click', (e) => {
          e.stopPropagation();
          if (!confirm(`Kill session "${id}"? This destroys it permanently.`)) return;
          sendCtrl({ type: 'session-kill', id });
        });

        chip.appendChild(attach);
        chip.appendChild(kill);
        detachedBar.appendChild(chip);
      }
    }

    // ===== info bar ======================================================
    // Replaces tmux's status bar. Shows: client count, active session,
    // active cwd, our origin IP (the Cf-Connecting-Ip the server saw).
    const infoBar = document.getElementById('info-bar');
    const connInfo = { ip: '?', email: '?', user: '', host: '' };
    const sessionClients = new Map();   // sessionId -> count

    function paintInfoBar() {
      infoBar.innerHTML = '';
      const id = activeId;
      const t = id ? tabs.get(id) : null;
      const fullCwd = t?.cwd || '';
      // Short form for the muted folder pill on the right (still abbreviates
      // ~/...). The leading prompt-style pill shows the full path.
      const shortCwd = fullCwd ? fullCwd.replace(/^\/home\/[^/]+/, '~') : '';
      const count = (id && sessionClients.has(id))
        ? sessionClients.get(id)
        : (t?.session ? 1 : 0);

      function pill(icon, text, options) {
        const p = document.createElement('span');
        p.className = 'info-pill' + (options?.muted ? ' muted' : '');
        if (options?.title) p.title = options.title;
        const ic = document.createElement('span');
        ic.className = 'icon';
        ic.textContent = icon;
        const tx = document.createElement('span');
        tx.textContent = text;
        p.appendChild(ic);
        p.appendChild(tx);
        infoBar.appendChild(p);
      }

      // Prompt-style status pill (Claude-Code-influenced): user@host:cwd.
      // Mirrors what a shell PS1 would show. Anchored leftmost, takes up
      // any leftover info-bar space so the path is actually readable on
      // wide screens, ellipsised on narrow ones.
      if (connInfo.user && connInfo.host) {
        const p = document.createElement('span');
        p.className = 'info-pill prompt';
        p.title = `signed in as ${connInfo.email}`;
        const uh = document.createElement('span'); uh.className = 'ph-userhost';
        uh.textContent = `${connInfo.user}@${connInfo.host}`;
        const sep = document.createElement('span'); sep.className = 'ph-sep'; sep.textContent = ':';
        const cw = document.createElement('span'); cw.className = 'ph-cwd';
        cw.textContent = fullCwd || (id ? '(cwd…)' : '(no session)');
        p.appendChild(uh);
        p.appendChild(sep);
        p.appendChild(cw);
        infoBar.appendChild(p);
      }

      pill('●', count + (count === 1 ? ' device' : ' devices'),
        { title: 'WebSocket subscribers attached to this session' });
      pill('▸', id || 'no session');
      if (shortCwd) pill('🗀', shortCwd, { muted: true });
      pill('⌂', connInfo.ip, { muted: true, title: `you (${connInfo.email})` });
    }

    // Hook the painters into existing flow without touching every call site.
    // Wrap switchTo, removeTab. Tab.attach/detachLocal already mutate state;
    // we monkey-patch their prototypes to call the painters after.
    const _origSwitchTo = switchTo;
    switchTo = function (id) {
      _origSwitchTo(id);
      paintDetachedBar();
      paintInfoBar();
      // Refresh cwd immediately on tab switch — otherwise the prompt-style
      // pill shows "(cwd…)" until the next poll tick (up to 3s).
      if (id && tabs.get(id)?.subscribed) {
        sendCtrl({ type: 'session-cwd', id });
      }
    };
    const _origRemoveTab = removeTab;
    removeTab = function (id) {
      _origRemoveTab(id);
      paintDetachedBar();
      paintInfoBar();
    };
    const _origAttach = Tab.prototype.attach;
    Tab.prototype.attach = function () {
      _origAttach.call(this);
      paintDetachedBar();
      paintInfoBar();
    };
    const _origDetachLocal = Tab.prototype.detachLocal;
    Tab.prototype.detachLocal = function (reason) {
      _origDetachLocal.call(this, reason);
      // If the active tab just became dormant, switch to any other
      // attached one — otherwise the pane area goes blank.
      if (activeId === this.id) {
        const next = Array.from(tabs.values()).find((t) => t !== this && t.session);
        if (next) {
          switchTo(next.id);
        } else {
          activeId = null;
          paneEmpty.style.display = 'flex';
          paneEmpty.textContent = 'no active sessions — pick one from the bar below or tap +';
          updateDocTitle();
        }
      }
      paintDetachedBar();
      paintInfoBar();
    };

    // ===== boot the WS ====================================================
    connect();
    paintInfoBar();   // initial render with placeholders
    // Apply the persisted mouse state right after the WS opens. We call
    // this in `wireWs.onopen` indirectly via a pending list — simplest:
    // push it 200ms after first open.
    setTimeout(() => {
      if (ws && ws.readyState === WebSocket.OPEN) {
        sendCtrl({ type: 'tmux-mouse', on: tmuxMouseOn });
      }
    }, 250);
  </script>
</body>
</html>
