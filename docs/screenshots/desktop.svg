<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
     font-size="13" role="img" aria-label="terminalcat desktop UI mockup">

  <!-- ───── window chrome ───── -->
  <rect width="1280" height="760" rx="10" fill="#0c0c0c"/>

  <!-- macOS-style traffic lights (just visual hint of "browser window") -->
  <circle cx="22"  cy="22" r="6" fill="#f7768e"/>
  <circle cx="44"  cy="22" r="6" fill="#e0af68"/>
  <circle cx="66"  cy="22" r="6" fill="#9ece6a"/>
  <text x="640" y="26" text-anchor="middle" fill="#6a7088" font-size="12">terminalcat</text>

  <!-- ───── tab bar ───── -->
  <rect x="0" y="44" width="1280" height="36" fill="#15161e"/>
  <line x1="0" y1="80" x2="1280" y2="80" stroke="#2c2e3e" stroke-width="1"/>

  <!-- inactive tab: tab1 -->
  <rect x="0"   y="44" width="170" height="36" fill="#15161e"/>
  <text x="14"  y="66" fill="#a9b1d6">tab1</text>
  <text x="50"  y="66" fill="#6a7088" font-size="11">~/recon</text>
  <line x1="170" y1="44" x2="170" y2="80" stroke="#2c2e3e"/>

  <!-- active tab: recon (blue underline) -->
  <rect x="170" y="44" width="170" height="36" fill="#0c0c0c"/>
  <text x="184" y="66" fill="#c0caf5">recon</text>
  <text x="232" y="66" fill="#6a7088" font-size="11">~/bb-recon</text>
  <rect x="170" y="76" width="170" height="3" fill="#7aa2f7"/>
  <line x1="340" y1="44" x2="340" y2="80" stroke="#2c2e3e"/>

  <!-- inactive tab: notes -->
  <rect x="340" y="44" width="170" height="36" fill="#15161e"/>
  <text x="354" y="66" fill="#a9b1d6">notes</text>
  <text x="402" y="66" fill="#6a7088" font-size="11">~/notes</text>

  <!-- + button -->
  <text x="540" y="68" fill="#7aa2f7" font-size="20">+</text>

  <!-- ───── terminal pane ───── -->
  <rect x="0" y="80" width="1280" height="540" fill="#0c0c0c"/>

  <!-- bash prompt: \u@\h in green, : in white, \w in blue -->
  <g fill="#9ece6a">
    <text x="14" y="110">ubuntu@host</text>
  </g>
  <text x="110" y="110" fill="#c0caf5">:</text>
  <text x="118" y="110" fill="#7aa2f7">~/bb-recon</text>
  <text x="200" y="110" fill="#c0caf5">$ ls --color</text>

  <!-- ls output — directories in blue, executables in green, files white -->
  <text x="14"  y="135" fill="#7aa2f7">alive/</text>
  <text x="120" y="135" fill="#7aa2f7">cves/</text>
  <text x="220" y="135" fill="#9ece6a">httpx-batch.sh</text>
  <text x="380" y="135" fill="#c0caf5">notes.md</text>
  <text x="500" y="135" fill="#c0caf5">nuclei-out.txt</text>
  <text x="660" y="135" fill="#7aa2f7">subzy/</text>
  <text x="740" y="135" fill="#9ece6a">webdl-test</text>
  <text x="870" y="135" fill="#bb9af7">target.list</text>

  <!-- next prompt running htop, just snippets -->
  <text x="14"  y="165" fill="#9ece6a">ubuntu@host</text>
  <text x="110" y="165" fill="#c0caf5">:</text>
  <text x="118" y="165" fill="#7aa2f7">~/bb-recon</text>
  <text x="200" y="165" fill="#c0caf5">$ htop</text>

  <!-- htop-style header bars -->
  <text x="14"  y="195" fill="#9ece6a">  1 [</text>
  <text x="56"  y="195" fill="#7aa2f7">|||||||||</text>
  <text x="170" y="195" fill="#6a7088">              </text>
  <text x="340" y="195" fill="#c0caf5">]  72.3%</text>
  <text x="14"  y="215" fill="#9ece6a">  2 [</text>
  <text x="56"  y="215" fill="#7aa2f7">||||||</text>
  <text x="170" y="215" fill="#6a7088">                 </text>
  <text x="340" y="215" fill="#c0caf5">]  41.2%</text>
  <text x="14"  y="235" fill="#9ece6a">  3 [</text>
  <text x="56"  y="235" fill="#7aa2f7">||||</text>
  <text x="170" y="235" fill="#6a7088">                   </text>
  <text x="340" y="235" fill="#c0caf5">]  18.0%</text>

  <text x="14"  y="265" fill="#a9b1d6">  PID USER     PR  NI    CMD</text>
  <text x="14"  y="285" fill="#c0caf5">12345 ubuntu   20   0    nuclei -l alive.txt -severity high</text>
  <text x="14"  y="305" fill="#c0caf5">12389 ubuntu   20   0    httpx -title -location</text>
  <text x="14"  y="325" fill="#c0caf5">12421 ubuntu   20   0    bash</text>
  <text x="14"  y="345" fill="#6a7088">12556 ubuntu   20   0    sleep 300</text>

  <!-- visible scrollback after htop quits -->
  <text x="14"  y="395" fill="#9ece6a">ubuntu@host</text>
  <text x="110" y="395" fill="#c0caf5">:</text>
  <text x="118" y="395" fill="#7aa2f7">~/bb-recon</text>
  <text x="200" y="395" fill="#c0caf5">$ webdl nuclei-out.txt</text>
  <text x="14"  y="415" fill="#7dcfff">[downloading nuclei-out.txt (24576 bytes)]</text>
  <text x="14"  y="435" fill="#9ece6a">ubuntu@host</text>
  <text x="110" y="435" fill="#c0caf5">:</text>
  <text x="118" y="435" fill="#7aa2f7">~/bb-recon</text>
  <text x="200" y="435" fill="#c0caf5">$ <tspan fill="#c0caf5">▌</tspan></text>

  <!-- floating transfer card (download) bottom-right of terminal area -->
  <g transform="translate(990,510)">
    <rect width="270" height="56" rx="8" fill="#1a1b26" stroke="#2c2e3e"/>
    <text x="12" y="22" fill="#c0caf5">↓ nuclei-out.txt</text>
    <text x="240" y="22" fill="#9ece6a" text-anchor="end">done</text>
    <rect x="12" y="36" width="246" height="4" rx="2" fill="#2c2e3e"/>
    <rect x="12" y="36" width="246" height="4" rx="2" fill="#9ece6a"/>
  </g>

  <!-- ───── detached chip bar ───── -->
  <rect x="0" y="620" width="1280" height="32" fill="#1a1b26"/>
  <line x1="0" y1="620" x2="1280" y2="620" stroke="#2c2e3e"/>
  <text x="14" y="640" fill="#6a7088" font-size="11" letter-spacing="1">DETACHED:</text>

  <!-- chip: ↶ scratch × -->
  <g transform="translate(105,628)">
    <rect width="120" height="20" rx="10" fill="#2c2e3e"/>
    <text x="10" y="14" fill="#7aa2f7">↶</text>
    <text x="22" y="14" fill="#a9b1d6">scratch</text>
    <line x1="84" y1="2" x2="84" y2="18" stroke="#1a1b26"/>
    <text x="100" y="14" fill="#6a7088" text-anchor="middle">×</text>
  </g>
  <g transform="translate(235,628)">
    <rect width="100" height="20" rx="10" fill="#2c2e3e"/>
    <text x="10" y="14" fill="#7aa2f7">↶</text>
    <text x="22" y="14" fill="#a9b1d6">old-vpn</text>
    <line x1="64" y1="2" x2="64" y2="18" stroke="#1a1b26"/>
    <text x="80" y="14" fill="#6a7088" text-anchor="middle">×</text>
  </g>

  <!-- ───── info bar ───── -->
  <rect x="0" y="652" width="1280" height="24" fill="#1f2335"/>
  <line x1="0" y1="652" x2="1280" y2="652" stroke="#2c2e3e"/>

  <text x="14"  y="668" fill="#9ece6a">●</text>
  <text x="26"  y="668" fill="#a9b1d6">2 devices</text>
  <text x="135" y="668" fill="#9ece6a">▸</text>
  <text x="148" y="668" fill="#a9b1d6">recon</text>
  <text x="215" y="668" fill="#6a7088">🗀</text>
  <text x="232" y="668" fill="#6a7088">~/bb-recon</text>
  <text x="345" y="668" fill="#6a7088">⌂</text>
  <text x="358" y="668" fill="#6a7088">203.0.113.42</text>

  <!-- ───── helper bar ───── -->
  <rect x="0" y="676" width="1280" height="84" fill="#15161e"/>
  <line x1="0" y1="676" x2="1280" y2="676" stroke="#2c2e3e"/>

  <g transform="translate(8,700)">
    <!-- Esc -->
    <rect x="0"   y="0" width="48"  height="36" rx="6" fill="#2c2e3e"/><text x="24"  y="22" fill="#c0caf5" text-anchor="middle">Esc</text>
    <!-- Tab -->
    <rect x="56"  y="0" width="48"  height="36" rx="6" fill="#2c2e3e"/><text x="80"  y="22" fill="#c0caf5" text-anchor="middle">Tab</text>
    <!-- Ctrl (sticky lit) -->
    <rect x="112" y="0" width="48"  height="36" rx="6" fill="#7aa2f7"/><text x="136" y="22" fill="#0c0c0c" text-anchor="middle" font-weight="bold">Ctrl</text>
    <!-- Alt -->
    <rect x="168" y="0" width="48"  height="36" rx="6" fill="#2c2e3e"/><text x="192" y="22" fill="#c0caf5" text-anchor="middle">Alt</text>
    <!-- arrows -->
    <rect x="224" y="0" width="42"  height="36" rx="6" fill="#2c2e3e"/><text x="245" y="22" fill="#c0caf5" text-anchor="middle">↑</text>
    <rect x="274" y="0" width="42"  height="36" rx="6" fill="#2c2e3e"/><text x="295" y="22" fill="#c0caf5" text-anchor="middle">↓</text>
    <rect x="324" y="0" width="42"  height="36" rx="6" fill="#2c2e3e"/><text x="345" y="22" fill="#c0caf5" text-anchor="middle">←</text>
    <rect x="374" y="0" width="42"  height="36" rx="6" fill="#2c2e3e"/><text x="395" y="22" fill="#c0caf5" text-anchor="middle">→</text>
    <!-- ^A ^C ^D -->
    <rect x="424" y="0" width="42"  height="36" rx="6" fill="#2c2e3e"/><text x="445" y="22" fill="#c0caf5" text-anchor="middle">^A</text>
    <rect x="474" y="0" width="42"  height="36" rx="6" fill="#2c2e3e"/><text x="495" y="22" fill="#c0caf5" text-anchor="middle">^C</text>
    <rect x="524" y="0" width="42"  height="36" rx="6" fill="#2c2e3e"/><text x="545" y="22" fill="#c0caf5" text-anchor="middle">^D</text>
    <!-- upload / snippets / search / mouse -->
    <rect x="582" y="0" width="42"  height="36" rx="6" fill="#2c2e3e"/><text x="603" y="22" fill="#c0caf5" text-anchor="middle">⇪</text>
    <rect x="632" y="0" width="42"  height="36" rx="6" fill="#2c2e3e"/><text x="653" y="22" fill="#c0caf5" text-anchor="middle">⌘</text>
    <rect x="682" y="0" width="42"  height="36" rx="6" fill="#2c2e3e"/><text x="703" y="22" fill="#c0caf5" text-anchor="middle">⌕</text>
    <!-- mouse-mode toggle (lit blue = ON) -->
    <rect x="732" y="0" width="42"  height="36" rx="6" fill="#7aa2f7"/><text x="753" y="22" fill="#0c0c0c" text-anchor="middle">🖱</text>
  </g>

</svg>
