<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
     font-size="13" role="img" aria-label="terminalcat right-click context menu">

  <!-- ── terminal area background (cropped from main UI) ── -->
  <rect width="800" height="480" rx="8" fill="#0c0c0c"/>

  <!-- some scrollback content for context -->
  <g>
    <text x="14" y="32"  fill="#9ece6a">ubuntu@host</text>
    <text x="110" y="32" fill="#c0caf5">:</text>
    <text x="118" y="32" fill="#7aa2f7">~/recon</text>
    <text x="200" y="32" fill="#c0caf5">$ nuclei -l alive.txt -severity high</text>

    <text x="14" y="58"  fill="#bb9af7">[INF]</text>
    <text x="60" y="58"  fill="#c0caf5">Templates loaded for current scan: 8742</text>
    <text x="14" y="78"  fill="#e0af68">[INF]</text>
    <text x="60" y="78"  fill="#c0caf5">Targets loaded for current scan: 12</text>
    <text x="14" y="98"  fill="#9ece6a">[CVE-2024-0204]</text>
    <text x="160" y="98" fill="#c0caf5"> [http] [critical] https://t1.example.com</text>
    <text x="14" y="118" fill="#f7768e">[CVE-2023-46604]</text>
    <text x="160" y="118" fill="#c0caf5"> [http] [critical] https://t3.example.com</text>
    <text x="14" y="138" fill="#9ece6a">ubuntu@host</text>
    <text x="110" y="138" fill="#c0caf5">:</text>
    <text x="118" y="138" fill="#7aa2f7">~/recon</text>
    <text x="200" y="138" fill="#c0caf5">$ <tspan fill="#c0caf5">▌</tspan></text>
  </g>

  <!-- crosshair to suggest "user right-clicked here" -->
  <g stroke="#7aa2f7" stroke-width="1" fill="none" opacity="0.6">
    <circle cx="240" cy="200" r="8"/>
    <line x1="232" y1="200" x2="248" y2="200"/>
    <line x1="240" y1="192" x2="240" y2="208"/>
  </g>

  <!-- ── context menu (small, Windows-style) ── -->
  <g transform="translate(248,210)" filter="url(#shadow)">
    <rect width="240" height="200" rx="6" fill="#1a1b26" stroke="#2c2e3e"/>

    <text x="14"  y="24"  fill="#c0caf5">Copy</text>
    <text x="226" y="24"  fill="#6a7088" text-anchor="end" font-size="11">Ctrl+Shift+C</text>

    <text x="14"  y="46"  fill="#c0caf5">Paste</text>
    <text x="226" y="46"  fill="#6a7088" text-anchor="end" font-size="11">Ctrl+Shift+V</text>

    <text x="14"  y="68"  fill="#c0caf5">Select all</text>
    <text x="226" y="68"  fill="#6a7088" text-anchor="end" font-size="11">Ctrl+Shift+A</text>

    <line x1="6" y1="80" x2="234" y2="80" stroke="#2c2e3e"/>

    <!-- highlighted (hovered) item: Search... -->
    <rect x="2" y="86" width="236" height="22" fill="#2c2e3e"/>
    <text x="14"  y="102" fill="#c0caf5">Search...</text>
    <text x="226" y="102" fill="#6a7088" text-anchor="end" font-size="11">Ctrl+Shift+F</text>

    <text x="14"  y="124" fill="#c0caf5">Clear screen</text>

    <line x1="6" y1="136" x2="234" y2="136" stroke="#2c2e3e"/>

    <text x="14"  y="158" fill="#f7768e">Detach session</text>
  </g>

  <!-- ── floating search bar at top right (just to hint Ctrl+Shift+F state) ── -->
  <g transform="translate(580,12)">
    <rect width="210" height="36" rx="6" fill="#1a1b26" stroke="#2c2e3e"/>
    <rect x="6" y="6" width="120" height="24" rx="4" fill="#0c0c0c" stroke="#2c2e3e"/>
    <text x="14" y="23" fill="#a9b1d6" font-size="12">CVE-2024</text>
    <rect x="134" y="6" width="22" height="24" rx="4" fill="#2c2e3e"/><text x="145" y="22" fill="#c0caf5" text-anchor="middle">↑</text>
    <rect x="160" y="6" width="22" height="24" rx="4" fill="#2c2e3e"/><text x="171" y="22" fill="#c0caf5" text-anchor="middle">↓</text>
    <rect x="186" y="6" width="22" height="24" rx="4" fill="#2c2e3e"/><text x="197" y="22" fill="#c0caf5" text-anchor="middle">×</text>
  </g>

  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
</svg>
