<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 540" font-family="ui-monospace, Menlo, Consolas, 'DejaVu Sans Mono', monospace">
  <!--
    Animated demo of terminalcat. Tokyo-Night palette.
    Sequence (12s loop):
      0–2s   : show app shell, prompt waits
      2–4s   : type `nuclei -l targets.txt -t cves`
      4–6s   : output streams in (3 result lines)
      6–8s   : switch tabs (scan -> deploy)
      8–10s  : show deploy tab with `webdl report.json`
      10–12s : Claude-Code-style status pill highlight at bottom
    Loops via repeatCount="indefinite" on every animate.
  -->

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1b26"/>
      <stop offset="1" stop-color="#16161e"/>
    </linearGradient>
    <clipPath id="screen-clip">
      <rect x="0" y="60" width="920" height="420"/>
    </clipPath>
  </defs>

  <rect width="920" height="540" rx="10" fill="url(#bg)"/>

  <!-- chrome bar -->
  <rect x="0" y="0" width="920" height="34" fill="#16161e" rx="10"/>
  <rect x="0" y="24" width="920" height="10" fill="#16161e"/>
  <circle cx="20" cy="17" r="6" fill="#f7768e"/>
  <circle cx="42" cy="17" r="6" fill="#e0af68"/>
  <circle cx="64" cy="17" r="6" fill="#9ece6a"/>
  <text x="460" y="21" text-anchor="middle" fill="#565f89" font-size="12">terminalcat — shell.example.com</text>

  <!-- tab bar -->
  <rect x="0" y="34" width="920" height="36" fill="#1f2335"/>
  <!-- tab "scan" — active when t in [0,8) and again [10,12) -->
  <g>
    <rect x="10" y="42" width="150" height="24" rx="5" fill="#24283b" stroke="#7aa2f7" stroke-width="1.5">
      <animate attributeName="stroke" values="#7aa2f7;#7aa2f7;#7aa2f7;#414868;#414868;#7aa2f7" keyTimes="0;0.55;0.66;0.67;0.83;1" dur="12s" repeatCount="indefinite"/>
    </rect>
    <text x="22" y="58" fill="#9ece6a" font-size="11">●</text>
    <text x="36" y="58" fill="#c0caf5" font-size="12">scan</text>
    <text x="74" y="58" fill="#565f89" font-size="11">~/scans</text>
  </g>
  <!-- tab "deploy" — becomes active during [8,10) -->
  <g>
    <rect x="170" y="42" width="170" height="24" rx="5" fill="#1f2335" stroke="#414868" stroke-width="1.5">
      <animate attributeName="stroke" values="#414868;#414868;#414868;#7aa2f7;#7aa2f7;#414868" keyTimes="0;0.55;0.66;0.67;0.83;1" dur="12s" repeatCount="indefinite"/>
    </rect>
    <!-- background-tab activity dot — visible during [4,6) when scan is producing output -->
    <circle cx="184" cy="54" r="3" fill="#e0af68" opacity="0">
      <animate attributeName="opacity" values="0;0;1;0;0" keyTimes="0;0.33;0.34;0.6;1" dur="12s" repeatCount="indefinite"/>
    </circle>
    <text x="195" y="58" fill="#a9b1d6" font-size="12">deploy</text>
    <text x="240" y="58" fill="#565f89" font-size="11">~/projects/api</text>
  </g>
  <text x="350" y="58" fill="#565f89" font-size="14">＋</text>

  <!-- =============== screen content =============== -->
  <g clip-path="url(#screen-clip)">
    <!-- ===== "scan" tab content (visible 0..8 and 10..12) ===== -->
    <g>
      <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.66;0.67;0.83;0.84" dur="12s" repeatCount="indefinite"/>

      <!-- prompt + typed command -->
      <text x="20" y="100" font-size="14">
        <tspan fill="#9ece6a" font-weight="600">ubuntu@anand</tspan><tspan fill="#565f89">:</tspan><tspan fill="#7aa2f7" font-weight="600">~/scans</tspan><tspan fill="#c0caf5">$ </tspan><tspan id="cmd1" fill="#c0caf5"></tspan>
      </text>

      <!-- typed-command reveal: animate clip-path width -->
      <g>
        <text x="183" y="100" fill="#c0caf5" font-size="14" clip-path="inset(0 100% 0 0)">
          <animate attributeName="clip-path" values="inset(0 100% 0 0);inset(0 100% 0 0);inset(0 0 0 0);inset(0 0 0 0);inset(0 100% 0 0)" keyTimes="0;0.16;0.33;0.83;0.84" dur="12s" repeatCount="indefinite"/>
          nuclei -l targets.txt -t cves -severity high
        </text>
      </g>

      <!-- blinking cursor while typing (visible until t=4) -->
      <rect x="183" y="88" width="9" height="16" fill="#c0caf5" opacity="0">
        <animate attributeName="opacity" values="1;1;1;0;0" keyTimes="0;0.16;0.33;0.34;1" dur="12s" repeatCount="indefinite"/>
        <animate attributeName="x" values="183;183;540;540;183" keyTimes="0;0.16;0.33;0.34;1" dur="12s" repeatCount="indefinite"/>
      </rect>

      <!-- output line 1: nuclei banner -->
      <text x="20" y="135" fill="#7dcfff" font-size="13" opacity="0">
        <animate attributeName="opacity" values="0;0;0;1;1;0" keyTimes="0;0.33;0.34;0.4;0.83;0.84" dur="12s" repeatCount="indefinite"/>
        [INF] nuclei v3.4.7 · loaded 7 targets, 4123 templates
      </text>

      <!-- output line 2 -->
      <text x="20" y="160" font-size="13" opacity="0">
        <animate attributeName="opacity" values="0;0;0;0;1;1;0" keyTimes="0;0.4;0.41;0.42;0.45;0.83;0.84" dur="12s" repeatCount="indefinite"/>
        <tspan fill="#f7768e" font-weight="600">[CRITICAL]</tspan> <tspan fill="#a9b1d6">CVE-2024-9821 · </tspan><tspan fill="#7aa2f7" text-decoration="underline">https://api.example.com/admin</tspan>
      </text>

      <!-- output line 3 -->
      <text x="20" y="185" font-size="13" opacity="0">
        <animate attributeName="opacity" values="0;0;0;0;1;1;0" keyTimes="0;0.45;0.46;0.47;0.5;0.83;0.84" dur="12s" repeatCount="indefinite"/>
        <tspan fill="#e0af68" font-weight="600">[HIGH]</tspan> <tspan fill="#a9b1d6">CVE-2023-50164 · </tspan><tspan fill="#7aa2f7" text-decoration="underline">https://app.example.com/struts</tspan>
      </text>

      <!-- output line 4 -->
      <text x="20" y="210" font-size="13" opacity="0">
        <animate attributeName="opacity" values="0;0;0;0;1;1;0" keyTimes="0;0.5;0.51;0.52;0.55;0.83;0.84" dur="12s" repeatCount="indefinite"/>
        <tspan fill="#e0af68" font-weight="600">[HIGH]</tspan> <tspan fill="#a9b1d6">cors-misconfig · </tspan><tspan fill="#7aa2f7" text-decoration="underline">https://api.example.com</tspan>
      </text>

      <!-- output line 5 -->
      <text x="20" y="235" font-size="13" opacity="0">
        <animate attributeName="opacity" values="0;0;0;0;1;1;0" keyTimes="0;0.55;0.56;0.57;0.6;0.83;0.84" dur="12s" repeatCount="indefinite"/>
        <tspan fill="#9ece6a">[INF]</tspan> <tspan fill="#a9b1d6">3 findings · 12.4 s · run as ubuntu@anand</tspan>
      </text>

      <!-- next prompt -->
      <text x="20" y="265" font-size="14" opacity="0">
        <animate attributeName="opacity" values="0;0;0;0;1;1;0" keyTimes="0;0.6;0.61;0.62;0.65;0.83;0.84" dur="12s" repeatCount="indefinite"/>
        <tspan fill="#9ece6a" font-weight="600">ubuntu@anand</tspan><tspan fill="#565f89">:</tspan><tspan fill="#7aa2f7" font-weight="600">~/scans</tspan><tspan fill="#c0caf5">$ </tspan>
      </text>
    </g>

    <!-- ===== "deploy" tab content (visible 8..10) ===== -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;0;0;1;1;0" keyTimes="0;0.66;0.665;0.67;0.7;0.83;0.84" dur="12s" repeatCount="indefinite"/>

      <text x="20" y="100" font-size="14">
        <tspan fill="#9ece6a" font-weight="600">ubuntu@anand</tspan><tspan fill="#565f89">:</tspan><tspan fill="#7aa2f7" font-weight="600">~/projects/api</tspan><tspan fill="#c0caf5">$ </tspan><tspan fill="#c0caf5">webdl report.json</tspan>
      </text>
      <text x="20" y="130" font-size="13" fill="#9ece6a">[uploaded report.json (148 KB) — sending to your browser]</text>
      <text x="20" y="160" font-size="13">
        <tspan fill="#a9b1d6">┌─ download progress ────────────────────────────┐</tspan>
      </text>
      <text x="20" y="180" font-size="13">
        <tspan fill="#a9b1d6">│ </tspan><tspan fill="#7aa2f7">████████████████████████████████████</tspan><tspan fill="#a9b1d6">  100%  │</tspan>
      </text>
      <text x="20" y="200" font-size="13">
        <tspan fill="#a9b1d6">└────────────────────────────────────────────────┘</tspan>
      </text>
      <text x="20" y="230" font-size="13" fill="#565f89">→ saved to ~/Downloads/report.json on your phone</text>
      <text x="20" y="260" font-size="14">
        <tspan fill="#9ece6a" font-weight="600">ubuntu@anand</tspan><tspan fill="#565f89">:</tspan><tspan fill="#7aa2f7" font-weight="600">~/projects/api</tspan><tspan fill="#c0caf5">$ </tspan>
      </text>
    </g>
  </g>

  <!-- ===== bottom info bar (always visible) ===== -->
  <rect x="0" y="490" width="920" height="50" fill="#1f2335"/>
  <line x1="0" y1="490" x2="920" y2="490" stroke="#2c2e3e"/>

  <!-- prompt-style pill — Claude-Code style -->
  <text x="14" y="514" font-size="13" font-weight="600">
    <tspan fill="#9ece6a">ubuntu@anand</tspan><tspan fill="#565f89">:</tspan><tspan fill="#7aa2f7" id="cwd-text">~/scans</tspan>
  </text>
  <!-- when in deploy tab, swap the cwd -->
  <rect x="106" y="503" width="62" height="14" fill="#1f2335">
    <animate attributeName="opacity" values="0;0;0;0;1;1;0" keyTimes="0;0.66;0.665;0.67;0.7;0.83;0.84" dur="12s" repeatCount="indefinite"/>
  </rect>
  <text x="106" y="514" fill="#7aa2f7" font-size="13" font-weight="600" opacity="0">
    <animate attributeName="opacity" values="0;0;0;0;1;1;0" keyTimes="0;0.66;0.665;0.67;0.7;0.83;0.84" dur="12s" repeatCount="indefinite"/>
    ~/projects/api
  </text>

  <!-- device count + session id pills -->
  <text x="320" y="514" font-size="12" fill="#a9b1d6">
    <tspan fill="#9ece6a">●</tspan> 2 devices  ·  <tspan fill="#9ece6a">▸</tspan> scan
  </text>
  <!-- session swap to deploy when t in [8,10) -->
  <text x="320" y="514" font-size="12" fill="#a9b1d6" opacity="0">
    <animate attributeName="opacity" values="0;0;0;0;1;1;0" keyTimes="0;0.66;0.665;0.67;0.7;0.83;0.84" dur="12s" repeatCount="indefinite"/>
    <tspan fill="#1f2335">                                </tspan>
  </text>
  <text x="320" y="514" font-size="12" fill="#a9b1d6" opacity="0">
    <animate attributeName="opacity" values="0;0;0;0;1;1;0" keyTimes="0;0.66;0.665;0.67;0.7;0.83;0.84" dur="12s" repeatCount="indefinite"/>
    <tspan fill="#9ece6a">●</tspan> 2 devices  ·  <tspan fill="#9ece6a">▸</tspan> deploy
  </text>

  <!-- right-side: connection -->
  <text x="820" y="514" font-size="12" fill="#565f89">⌂ via tunnel</text>

  <!-- Cloudflare Access lock icon (right of chrome) -->
  <g transform="translate(870, 9)">
    <rect x="0" y="0" width="14" height="16" rx="2" fill="none" stroke="#9ece6a" stroke-width="1.5"/>
    <rect x="3" y="-3" width="8" height="6" rx="3" fill="none" stroke="#9ece6a" stroke-width="1.5"/>
    <circle cx="7" cy="8" r="1.5" fill="#9ece6a"/>
  </g>
</svg>
