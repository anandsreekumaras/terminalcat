<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
     font-size="11" role="img" aria-label="terminalcat mobile (PWA, keyboard up)">

  <!-- phone bezel -->
  <rect width="390" height="844" rx="44" fill="#1a1b26"/>
  <rect x="2" y="2" width="386" height="840" rx="42" fill="#0c0c0c"/>

  <!-- iOS-style notch / dynamic island hint -->
  <rect x="135" y="12" width="120" height="28" rx="14" fill="#15161e"/>

  <!-- status bar (time / signal / battery) -->
  <text x="22" y="32" fill="#c0caf5" font-weight="bold">9:41</text>
  <text x="368" y="32" fill="#c0caf5" text-anchor="end">▮▮▮ 87%</text>

  <!-- ── tab bar (PWA standalone — no URL bar) ── -->
  <rect x="2" y="50" width="386" height="32" fill="#15161e"/>
  <line x1="2" y1="82" x2="388" y2="82" stroke="#2c2e3e"/>
  <!-- active tab1 -->
  <rect x="6"   y="50" width="106" height="32" fill="#0c0c0c"/>
  <text x="14"  y="70" fill="#c0caf5">tab1</text>
  <text x="44"  y="70" fill="#6a7088" font-size="10">~/recon</text>
  <rect x="6"   y="78" width="106" height="2" fill="#7aa2f7"/>
  <!-- inactive tabs (truncated; bar scrolls) -->
  <rect x="112" y="50" width="80" height="32" fill="#15161e"/>
  <text x="120" y="70" fill="#a9b1d6">notes</text>
  <rect x="192" y="50" width="80" height="32" fill="#15161e"/>
  <text x="200" y="70" fill="#a9b1d6">vpn</text>
  <text x="290" y="72" fill="#7aa2f7" font-size="18">+</text>

  <!-- ── terminal pane (bash + vim INSERT) ── -->
  <rect x="2" y="82" width="386" height="280" fill="#0c0c0c"/>

  <text x="10" y="102" fill="#9ece6a">ubuntu@host</text>
  <text x="86" y="102" fill="#c0caf5">:</text>
  <text x="91" y="102" fill="#7aa2f7">~/recon</text>
  <text x="143" y="102" fill="#c0caf5">$ vim notes.md</text>

  <text x="10" y="125" fill="#c0caf5"># Recon notes — target.example.com</text>
  <text x="10" y="143" fill="#c0caf5"></text>
  <text x="10" y="161" fill="#c0caf5">- subdomain enum: subzy + assetfinder</text>
  <text x="10" y="179" fill="#c0caf5">- 3 hosts return 200, 1 has open admin</text>
  <text x="10" y="197" fill="#c0caf5">- nuclei: medium SSRF candidate on /redirect</text>
  <text x="10" y="215" fill="#c0caf5">- followup: <tspan fill="#c0caf5">▌</tspan></text>

  <text x="10" y="345" fill="#bb9af7" font-weight="bold">-- INSERT --</text>

  <!-- ── detached chip bar ── -->
  <rect x="2" y="362" width="386" height="28" fill="#1a1b26"/>
  <line x1="2" y1="362" x2="388" y2="362" stroke="#2c2e3e"/>
  <text x="10" y="380" fill="#6a7088" font-size="10" letter-spacing="1">DETACHED:</text>
  <g transform="translate(80,367)">
    <rect width="105" height="18" rx="9" fill="#2c2e3e"/>
    <text x="9" y="13" fill="#7aa2f7">↶</text>
    <text x="20" y="13" fill="#a9b1d6">scratch</text>
    <line x1="74" y1="2" x2="74" y2="16" stroke="#1a1b26"/>
    <text x="89" y="13" fill="#6a7088" text-anchor="middle">×</text>
  </g>
  <g transform="translate(193,367)">
    <rect width="80" height="18" rx="9" fill="#2c2e3e"/>
    <text x="9" y="13" fill="#7aa2f7">↶</text>
    <text x="20" y="13" fill="#a9b1d6">notes</text>
    <line x1="56" y1="2" x2="56" y2="16" stroke="#1a1b26"/>
    <text x="68" y="13" fill="#6a7088" text-anchor="middle">×</text>
  </g>

  <!-- ── info bar ── -->
  <rect x="2" y="390" width="386" height="22" fill="#1f2335"/>
  <line x1="2" y1="390" x2="388" y2="390" stroke="#2c2e3e"/>
  <text x="10"  y="406" fill="#9ece6a">●</text>
  <text x="22"  y="406" fill="#a9b1d6">2 devices</text>
  <text x="100" y="406" fill="#9ece6a">▸</text>
  <text x="112" y="406" fill="#a9b1d6">tab1</text>
  <text x="160" y="406" fill="#6a7088">🗀</text>
  <text x="176" y="406" fill="#6a7088">~/recon</text>

  <!-- ── helper bar (above keyboard) ── -->
  <rect x="2" y="412" width="386" height="42" fill="#15161e"/>
  <line x1="2" y1="412" x2="388" y2="412" stroke="#2c2e3e"/>

  <g transform="translate(8,420)">
    <rect x="0"   y="0" width="32" height="26" rx="5" fill="#2c2e3e"/><text x="16"  y="18" fill="#c0caf5" text-anchor="middle" font-size="10">Esc</text>
    <rect x="36"  y="0" width="32" height="26" rx="5" fill="#2c2e3e"/><text x="52"  y="18" fill="#c0caf5" text-anchor="middle" font-size="10">Tab</text>
    <rect x="72"  y="0" width="32" height="26" rx="5" fill="#7aa2f7"/><text x="88"  y="18" fill="#0c0c0c" text-anchor="middle" font-weight="bold" font-size="10">Ctrl</text>
    <rect x="108" y="0" width="32" height="26" rx="5" fill="#2c2e3e"/><text x="124" y="18" fill="#c0caf5" text-anchor="middle" font-size="10">Alt</text>
    <rect x="144" y="0" width="28" height="26" rx="5" fill="#2c2e3e"/><text x="158" y="18" fill="#c0caf5" text-anchor="middle">↑</text>
    <rect x="176" y="0" width="28" height="26" rx="5" fill="#2c2e3e"/><text x="190" y="18" fill="#c0caf5" text-anchor="middle">↓</text>
    <rect x="208" y="0" width="28" height="26" rx="5" fill="#2c2e3e"/><text x="222" y="18" fill="#c0caf5" text-anchor="middle">←</text>
    <rect x="240" y="0" width="28" height="26" rx="5" fill="#2c2e3e"/><text x="254" y="18" fill="#c0caf5" text-anchor="middle">→</text>
    <rect x="272" y="0" width="32" height="26" rx="5" fill="#2c2e3e"/><text x="288" y="18" fill="#c0caf5" text-anchor="middle" font-size="10">^C</text>
    <rect x="308" y="0" width="32" height="26" rx="5" fill="#7aa2f7"/><text x="324" y="18" fill="#0c0c0c" text-anchor="middle" font-size="11">🖱</text>
  </g>

  <!-- ── keyboard mock (iOS) ── -->
  <rect x="2" y="454" width="386" height="370" fill="#1f2233"/>

  <!-- row 1: q w e r t y u i o p -->
  <g font-size="14" fill="#c0caf5">
    <g>
      <rect x="6"   y="466" width="32" height="40" rx="5" fill="#383d52"/><text x="22"  y="492" text-anchor="middle">q</text>
      <rect x="42"  y="466" width="32" height="40" rx="5" fill="#383d52"/><text x="58"  y="492" text-anchor="middle">w</text>
      <rect x="78"  y="466" width="32" height="40" rx="5" fill="#383d52"/><text x="94"  y="492" text-anchor="middle">e</text>
      <rect x="114" y="466" width="32" height="40" rx="5" fill="#383d52"/><text x="130" y="492" text-anchor="middle">r</text>
      <rect x="150" y="466" width="32" height="40" rx="5" fill="#383d52"/><text x="166" y="492" text-anchor="middle">t</text>
      <rect x="186" y="466" width="32" height="40" rx="5" fill="#383d52"/><text x="202" y="492" text-anchor="middle">y</text>
      <rect x="222" y="466" width="32" height="40" rx="5" fill="#383d52"/><text x="238" y="492" text-anchor="middle">u</text>
      <rect x="258" y="466" width="32" height="40" rx="5" fill="#383d52"/><text x="274" y="492" text-anchor="middle">i</text>
      <rect x="294" y="466" width="32" height="40" rx="5" fill="#383d52"/><text x="310" y="492" text-anchor="middle">o</text>
      <rect x="330" y="466" width="32" height="40" rx="5" fill="#383d52"/><text x="346" y="492" text-anchor="middle">p</text>
    </g>
    <!-- row 2: a s d f g h j k l -->
    <g>
      <rect x="22"  y="514" width="32" height="40" rx="5" fill="#383d52"/><text x="38"  y="540" text-anchor="middle">a</text>
      <rect x="58"  y="514" width="32" height="40" rx="5" fill="#383d52"/><text x="74"  y="540" text-anchor="middle">s</text>
      <rect x="94"  y="514" width="32" height="40" rx="5" fill="#383d52"/><text x="110" y="540" text-anchor="middle">d</text>
      <rect x="130" y="514" width="32" height="40" rx="5" fill="#383d52"/><text x="146" y="540" text-anchor="middle">f</text>
      <rect x="166" y="514" width="32" height="40" rx="5" fill="#383d52"/><text x="182" y="540" text-anchor="middle">g</text>
      <rect x="202" y="514" width="32" height="40" rx="5" fill="#383d52"/><text x="218" y="540" text-anchor="middle">h</text>
      <rect x="238" y="514" width="32" height="40" rx="5" fill="#383d52"/><text x="254" y="540" text-anchor="middle">j</text>
      <rect x="274" y="514" width="32" height="40" rx="5" fill="#383d52"/><text x="290" y="540" text-anchor="middle">k</text>
      <rect x="310" y="514" width="32" height="40" rx="5" fill="#383d52"/><text x="326" y="540" text-anchor="middle">l</text>
    </g>
    <!-- row 3: shift + z..m + backspace -->
    <g>
      <rect x="6"   y="562" width="40" height="40" rx="5" fill="#444a62"/><text x="26"  y="588" text-anchor="middle" font-size="13">⇧</text>
      <rect x="58"  y="562" width="32" height="40" rx="5" fill="#383d52"/><text x="74"  y="588" text-anchor="middle">z</text>
      <rect x="94"  y="562" width="32" height="40" rx="5" fill="#383d52"/><text x="110" y="588" text-anchor="middle">x</text>
      <rect x="130" y="562" width="32" height="40" rx="5" fill="#383d52"/><text x="146" y="588" text-anchor="middle">c</text>
      <rect x="166" y="562" width="32" height="40" rx="5" fill="#383d52"/><text x="182" y="588" text-anchor="middle">v</text>
      <rect x="202" y="562" width="32" height="40" rx="5" fill="#383d52"/><text x="218" y="588" text-anchor="middle">b</text>
      <rect x="238" y="562" width="32" height="40" rx="5" fill="#383d52"/><text x="254" y="588" text-anchor="middle">n</text>
      <rect x="274" y="562" width="32" height="40" rx="5" fill="#383d52"/><text x="290" y="588" text-anchor="middle">m</text>
      <rect x="310" y="562" width="40" height="40" rx="5" fill="#444a62"/><text x="330" y="588" text-anchor="middle" font-size="13">⌫</text>
    </g>
    <!-- row 4: 123 / globe / space / return -->
    <g>
      <rect x="6"   y="610" width="50" height="40" rx="5" fill="#444a62"/><text x="31"  y="636" text-anchor="middle" font-size="11">123</text>
      <rect x="60"  y="610" width="32" height="40" rx="5" fill="#444a62"/><text x="76"  y="636" text-anchor="middle" font-size="13">🌐</text>
      <rect x="96"  y="610" width="172" height="40" rx="5" fill="#383d52"/>
      <rect x="272" y="610" width="76" height="40" rx="5" fill="#444a62"/><text x="310" y="636" text-anchor="middle" font-size="11">return</text>
    </g>
  </g>

  <!-- iOS home indicator -->
  <rect x="155" y="824" width="80" height="4" rx="2" fill="#c0caf5"/>

</svg>
